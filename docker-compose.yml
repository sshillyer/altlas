services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    expose:
      - "3001"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/altlas.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
