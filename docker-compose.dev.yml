services:
  backend:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "apk add --no-cache python3 make g++ &&
             corepack enable &&
             pnpm install --no-frozen-lockfile &&
             pnpm --filter backend dev"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/backend/node_modules
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/altlas.db

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             pnpm install --no-frozen-lockfile &&
             pnpm --filter frontend dev --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/frontend/node_modules
